<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <defs>
    <radialGradient id="earthGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#4ade80"/>
      <stop offset="40%" stop-color="#22c55e"/>
      <stop offset="100%" stop-color="#15803d"/>
    </radialGradient>
    <radialGradient id="glowGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#bbf7d0" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#22c55e" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Outer glow ring -->
  <circle cx="200" cy="200" r="185" fill="url(#glowGrad)"/>

  <!-- Main earth circle -->
  <circle cx="200" cy="200" r="155" fill="url(#earthGrad)"/>

  <!-- Subtle continent shapes -->
  <ellipse cx="175" cy="165" rx="45" ry="38" fill="#15803d" opacity="0.5" transform="rotate(-15 175 165)"/>
  <ellipse cx="240" cy="210" rx="30" ry="50" fill="#15803d" opacity="0.4" transform="rotate(10 240 210)"/>
  <ellipse cx="155" cy="230" rx="22" ry="18" fill="#15803d" opacity="0.35"/>

  <!-- Pulse ring 1 -->
  <circle cx="200" cy="200" r="162" fill="none" stroke="#4ade80" stroke-width="2" opacity="0.5"/>
  <!-- Pulse ring 2 -->
  <circle cx="200" cy="200" r="172" fill="none" stroke="#4ade80" stroke-width="1.5" opacity="0.3"/>
  <!-- Pulse ring 3 -->
  <circle cx="200" cy="200" r="182" fill="none" stroke="#4ade80" stroke-width="1" opacity="0.15"/>

  <!-- ECG / pulse line across the earth -->
  <path d="M 60 200 L 110 200 L 128 200 L 140 165 L 155 235 L 168 180 L 178 220 L 190 200 L 340 200"
        fill="none" stroke="white" stroke-width="5" stroke-linecap="round" stroke-linejoin="round" opacity="0.95"/>

  <!-- Small dot at pulse peak -->
  <circle cx="168" cy="180" r="5" fill="white" opacity="0.9"/>
</svg>
