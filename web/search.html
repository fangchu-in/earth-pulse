<!DOCTYPE html>
<html lang="en">
<head>

  <meta property="og:title" content="Search — Earth Pulse, Baner, Pune">
  <meta property="og:description" content="Search 120+ bird species, 4 years of climate records, hill photos and more from Baner, Pune's citizen science observatory.">

  <meta property="og:url" content="https://earth-pulse.org/search.html">

  <!-- JSON-LD: WebSite with SearchAction (AI SEO + Google Sitelinks Search Box) -->
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "WebSite",
    "name": "Earth Pulse",
    "url": "https://earth-pulse.org",
    "description": "Independent citizen science environmental observatory monitoring bird biodiversity, air quality, and climate from Baner, Pune — eastern edge of the Western Ghats.",
    "potentialAction": {
      "@type": "SearchAction",
      "target": {
        "@type": "EntryPoint",
        "urlTemplate": "https://earth-pulse.org/search.html?q={search_term_string}"
      },
      "query-input": "required name=search_term_string"
    }
  }
  </script>
  <!-- JSON-LD: WebPage -->
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "WebPage",
    "name": "Search Earth Pulse",
    "description": "Search bird species detected by BirdNET acoustic AI, 4+ years of climate data, and hill photos from Baner, Pune.",
    "url": "https://earth-pulse.org/search.html",
    "isPartOf": { "@type": "WebSite", "name": "Earth Pulse", "url": "https://earth-pulse.org" },
    "breadcrumb": {
      "@type": "BreadcrumbList",
      "itemListElement": [
        { "@type": "ListItem", "position": 1, "name": "Home", "item": "https://earth-pulse.org/" },
        { "@type": "ListItem", "position": 2, "name": "Search", "item": "https://earth-pulse.org/search.html" }
      ]
    },
    "speakable": {
      "@type": "SpeakableSpecification",
      "cssSelector": [".ep-hero h1", ".ep-hero-sub", ".fun-fact-text"]
    }
  }
  </script>
  <!-- JSON-LD: FAQPage for AI crawlers -->
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "FAQPage",
    "mainEntity": [
      {
        "@type": "Question",
        "name": "What bird species have been detected in Baner, Pune?",
        "acceptedAnswer": { "@type": "Answer", "text": "Over 120 bird species have been detected using BirdNET acoustic AI from two monitoring nodes in Baner, Pune, on the eastern edge of the Western Ghats (Sahyadri). Species include Eurasian Kestrel, Indian Peafowl, Black Kite, and many more." }
      },
      {
        "@type": "Question",
        "name": "How can I search the Earth Pulse dataset?",
        "acceptedAnswer": { "@type": "Answer", "text": "Use the search page at earth-pulse.org/search.html to find bird species by common or scientific name, explore climate records by keyword (AQI, temperature, monsoon, Diwali pollution), or discover site pages. Results link directly to species profiles, climate charts, and analysis tools." }
      },
      {
        "@type": "Question",
        "name": "What climate data is available from Baner, Pune?",
        "acceptedAnswer": { "@type": "Answer", "text": "Earth Pulse has 4+ years of hourly climate readings (since January 2022) including AQI, temperature, humidity, wind, and solar radiation. ERA5 reanalysis data extends back to 1980, giving 45+ years of rainfall and temperature history for comparison." }
      }
    ]
  }
  </script>

  <style>
    /* ── Search bar ─────────────────────────────────────────── */
    .search-bar-wrap {
      max-width:700px; margin:0 auto; padding:0 1.5rem;
      position:sticky; top:62px; z-index:89;

    @media(max-width:600px){ .search-bar-wrap { padding:0 1rem; padding-top:1rem; padding-bottom:1rem; } }

    /* ── Filter tabs ────────────────────────────────────────── */
    .search-tabs {

    }

    /* ── Fun facts ticker ───────────────────────────────────── */

    /* ── Stats strip ────────────────────────────────────────── */

    /* ── Empty / loading ─────────────────────────────────────── */

      .fun-fact-inner { animation:none; }
      .result-card:hover { transform:none; }

  </style>

<script>
/* ══════════════════════════════════════════════════════════════
   EARTH PULSE — search.html
   Rebuilt Jun 24 2026.
   Fixes: paginated bird fetch (sbAll), fun facts from live data,
   dynamic meta tags, JSON-LD, robust error handling.
   ══════════════════════════════════════════════════════════════ */

const SUPABASE_URL = 'https://krmczyqwblsoekceanlj.supabase.co';
const SUPABASE_KEY = 'sb_publishable_DrHFT5J0vmrkYraUXIlpQQ_gsk1rdq6';
const HDR = { 'apikey': SUPABASE_KEY, 'Authorization': 'Bearer ' + SUPABASE_KEY };

let activeTab = 'all';
let debounceTimer = null;

/* ── Species index: fetched ONCE, paginated, cached for session ──────────── */
let speciesIndex = null;   // Map<scientific, {common, scientific, count, bestConf, lastSeen, newThisYear}>
let totalDetections = 0;
let dataReady = false;

/* ── Paginated fetch-all helper (sbAll pattern from handover) ────────────── */
function sbAll(path) {
  return new Promise(function(resolve, reject) {
    var all = [], off = 0;
    function next() {
      fetch(SUPABASE_URL + '/rest/v1/' + path + (path.includes('?') ? '&' : '?') + 'limit=1000&offset=' + off, { headers: HDR })
        .then(function(r) {
          if (!r.ok) throw new Error('Supabase ' + r.status);
          return r.json();
        })
        .then(function(rows) {
          if (!Array.isArray(rows) || !rows.length) { resolve(all); return; }
          all = all.concat(rows);
          if (rows.length < 1000) { resolve(all); return; }
          off += 1000;
          next();
        })
        .catch(reject);
    }
    next();
  });
}

/* ── Build species index from ALL bird detections ────────────────────────── */
async function buildSpeciesIndex() {
  var dot = document.getElementById('status-dot');
  var txt = document.getElementById('status-text');
  try {
    var rows = await sbAll('bird_detections?select=species_common,species_scientific,confidence,detected_at,is_new_species_this_year&order=detected_at.desc');
    totalDetections = rows.length;

    var map = new Map();
    for (var i = 0; i < rows.length; i++) {
      var r = rows[i];
      var sci = r.species_scientific;
      if (!sci) continue;
      var existing = map.get(sci);
      if (!existing) {
        map.set(sci, {
          common: r.species_common || sci,
          scientific: sci,
          count: 1,
          bestConf: r.confidence || 0,
          lastSeen: r.detected_at,
          newThisYear: r.is_new_species_this_year
        });
      } else {
        existing.count++;
        if (r.confidence > existing.bestConf) existing.bestConf = r.confidence;
        if (r.detected_at > existing.lastSeen) existing.lastSeen = r.detected_at;
        if (r.is_new_species_this_year) existing.newThisYear = true;
      }
    }
    speciesIndex = map;
    dataReady = true;

    dot.className = 'status-dot ok';
    txt.textContent = map.size + ' species · ' + totalDetections.toLocaleString('en-IN') + ' detections indexed';

    // Update dynamic meta + stats + fun facts
    updateDynamicMeta();
    renderStats();
    buildFunFacts(rows);

    return map;
  } catch (e) {
    console.warn('Species index error:', e);
    dot.className = 'status-dot err';
    txt.textContent = 'Offline — searching cached pages only';
    dataReady = false;
    speciesIndex = new Map();
    return speciesIndex;
  }
}

/* ── Dynamic meta tags (SEO — rewritten after data loads) ────────────────── */
function updateDynamicMeta() {
  if (!speciesIndex) return;
  var count = speciesIndex.size;
  var title = 'Search ' + count + ' Bird Species & Climate Data — Earth Pulse, Baner, Pune';
  var desc = 'Search ' + count + '+ bird species detected by BirdNET AI, ' +
    totalDetections.toLocaleString('en-IN') + ' acoustic detections, 4+ years of AQI, ' +
    'temperature, rainfall and climate records from Baner, Pune.';

  document.title = title;
  setMeta('description', desc);
  setMeta('og:title', title);
  setMeta('og:description', desc);
  setMeta('twitter:title', title);
  setMeta('twitter:description', desc);
}
function setMeta(name, content) {
  var el = document.querySelector('meta[name="' + name + '"], meta[property="' + name + '"]');
  if (el) el.setAttribute('content', content);
}

/* ── Stats strip ─────────────────────────────────────────────────────────── */
function renderStats() {
  if (!speciesIndex) return;
  var el = document.getElementById('search-stats');
  var pills = [
    { icon: '🦜', label: 'Species', value: speciesIndex.size },
    { icon: '🎙️', label: 'Detections', value: totalDetections.toLocaleString('en-IN') },
    { icon: '🌡️', label: 'Climate since', value: 'Jan 2022' },
    { icon: '📊', label: 'ERA5 since', value: '1980' },
  ];
  el.innerHTML = pills.map(function(p) {
    return '<span class="search-stat-pill">' + p.icon + ' <strong>' + p.value + '</strong> ' + p.label + '</span>';
  }).join('');
  el.style.display = 'flex';
}

/* ── Fun facts — data-driven from live counts ────────────────────────────── */
var funFacts = [];
var currentFact = 0;
var factTimer = null;

function buildFunFacts(rows) {
  if (!speciesIndex || speciesIndex.size === 0) return;
  funFacts = [];

  var species = Array.from(speciesIndex.values());
  species.sort(function(a, b) { return b.count - a.count; });

  // 1. Most detected species
  var top = species[0];
  if (top) funFacts.push({ emoji: '🏆', text: '<strong>' + top.common + '</strong> is the most detected bird with <strong>' + top.count.toLocaleString('en-IN') + '</strong> acoustic detections.' });

  // 2. Total species count
  funFacts.push({ emoji: '🌿', text: 'Baner\'s two AI microphones have identified <strong>' + speciesIndex.size + ' unique species</strong> — that\'s more than most European city parks.' });

  // 3. Rarest bird (fewest detections, min 2)
  var rare = species.filter(function(s) { return s.count >= 2; });
  if (rare.length > 1) {
    var rarest = rare[rare.length - 1];
    funFacts.push({ emoji: '💎', text: '<strong>' + rarest.common + '</strong> is one of the rarest visitors — heard only <strong>' + rarest.count + ' times</strong>.' });
  }

  // 4. New species this year
  var newSp = species.filter(function(s) { return s.newThisYear; });
  if (newSp.length > 0) {
    funFacts.push({ emoji: '⭐', text: '<strong>' + newSp.length + ' new species</strong> detected for the first time this year — the acoustic net keeps growing.' });
  }

  // 5. Highest confidence detection
  var best = species.reduce(function(a, b) { return a.bestConf > b.bestConf ? a : b; });
  if (best.bestConf > 0) {
    funFacts.push({ emoji: '🎯', text: '<strong>' + best.common + '</strong> had the highest confidence detection at <strong>' + (best.bestConf * 100).toFixed(0) + '%</strong>.' });
  }

  // 6. Detection rate
  if (totalDetections > 0) {
    // Estimate days since first detection
    var earliest = rows[rows.length - 1]?.detected_at;
    if (earliest) {
      var daysSince = Math.max(1, Math.round((Date.now() - new Date(earliest).getTime()) / 86400000));
      var perDay = Math.round(totalDetections / daysSince);
      funFacts.push({ emoji: '📡', text: 'The two BirdNET nodes detect an average of <strong>' + perDay + ' birds per day</strong> — that\'s one every <strong>' + Math.round(1440 / Math.max(1, perDay)) + ' minutes</strong>.' });
    }
  }

  // 7. Most recently heard species
  species.sort(function(a, b) { return b.lastSeen > a.lastSeen ? 1 : -1; });
  var recent = species[0];
  if (recent) {
    var ago = timeSince(new Date(recent.lastSeen));
    funFacts.push({ emoji: '👂', text: 'Last bird heard: <strong>' + recent.common + '</strong>, ' + ago + '.' });
  }

  // 8. Species that are heard only at night
  // (We don't have hour data in the index, so use a generic owl fact)
  funFacts.push({ emoji: '🦉', text: 'Search for "<strong>owl</strong>" or "<strong>nightjar</strong>" to find Baner\'s nocturnal species — some are only heard after midnight.' });

  // 9. Western Ghats context
  funFacts.push({ emoji: '🏔️', text: 'Baner sits on the <strong>eastern edge of the Western Ghats</strong>, a UNESCO World Heritage biodiversity hotspot — one of only 36 on Earth.' });

  // 10. Citizen science
  funFacts.push({ emoji: '🔬', text: 'All data is collected by <strong>two Raspberry Pi nodes</strong> running BirdNET AI 24/7 — real citizen science, no human in the loop.' });

  // Shuffle and render
  shuffleArray(funFacts);
  if (funFacts.length > 0) {
    document.getElementById('fun-facts-bar').style.display = 'block';
    renderFact(0);
    startFactRotation();
  }
}

function renderFact(idx) {
  currentFact = idx;
  var fact = funFacts[idx];
  document.getElementById('fun-fact-emoji').textContent = fact.emoji;
  document.getElementById('fun-fact-text').innerHTML = fact.text;

  // Re-trigger animation
  var inner = document.getElementById('fun-fact-inner');
  inner.style.animation = 'none';
  inner.offsetHeight; // force reflow
  inner.style.animation = '';

  // Dots
  var nav = document.getElementById('fun-fact-nav');
  nav.innerHTML = '';
  for (var i = 0; i < Math.min(funFacts.length, 10); i++) {
    var dot = document.createElement('span');
    dot.className = 'fun-fact-dot' + (i === idx ? ' active' : '');
    dot.setAttribute('data-i', i);
    dot.onclick = function() {
      clearInterval(factTimer);
      renderFact(parseInt(this.getAttribute('data-i')));
      startFactRotation();
    };
    nav.appendChild(dot);
  }
}

function startFactRotation() {
  clearInterval(factTimer);
  factTimer = setInterval(function() {
    var next = (currentFact + 1) % funFacts.length;
    renderFact(next);
  }, 6000);
}

function shuffleArray(arr) {
  for (var i = arr.length - 1; i > 0; i--) {
    var j = Math.floor(Math.random() * (i + 1));
    var t = arr[i]; arr[i] = arr[j]; arr[j] = t;
  }
}

function timeSince(date) {
  var s = Math.floor((Date.now() - date.getTime()) / 1000);
  if (s < 60) return 'just now';
  var m = Math.floor(s / 60);
  if (m < 60) return m + ' min ago';
  var h = Math.floor(m / 60);
  if (h < 24) return h + 'h ago';
  var d = Math.floor(h / 24);
  if (d === 1) return 'yesterday';
  return d + ' days ago';
}

/* ── Tab switching ────────────────────────────────────────────────────────── */
function setTab(type, btn) {
  document.querySelectorAll('.search-tab').forEach(function(b) {
    b.classList.remove('active');
    b.setAttribute('aria-selected', 'false');
  });
  btn.classList.add('active');
  btn.setAttribute('aria-selected', 'true');
  activeTab = type;
  var q = document.getElementById('search-input').value.trim();
  if (q.length >= 2) doSearch();
}

function setQuery(q) {
  document.getElementById('search-input').value = q;
  doSearch();
}

function onInput() {
  clearTimeout(debounceTimer);
  var q = document.getElementById('search-input').value.trim();
  if (q.length < 2) {
    document.getElementById('results-list').innerHTML = '';
    document.getElementById('suggestions').style.display = 'block';
    return;
  }
  debounceTimer = setTimeout(doSearch, 300);
}

/* ── Main search orchestrator ────────────────────────────────────────────── */
async function doSearch() {
  var q = document.getElementById('search-input').value.trim();
  if (!q || q.length < 2) return;

  document.getElementById('suggestions').style.display = 'none';
  document.getElementById('results-list').innerHTML = '<div class="search-loading">Searching…</div>';

  // Shareable URL
  var url = new URL(window.location);
  url.searchParams.set('q', q);
  window.history.replaceState({}, '', url);

  // Wait for species index if still loading (with timeout)
  if (!dataReady && speciesIndex === null) {
    try {
      await Promise.race([
        new Promise(function(resolve) {
          var check = setInterval(function() {
            if (dataReady || speciesIndex !== null) { clearInterval(check); resolve(); }
          }, 100);
        }),
        new Promise(function(_, reject) { setTimeout(function() { reject('timeout'); }, 5000); })
      ]);
    } catch(e) { /* proceed with what we have */ }
  }

  var results = [];

  // Birds — instant client-side search against pre-built index
  if (activeTab === 'all' || activeTab === 'birds') searchBirds(q, results);

  // Climate — keyword matching
  if (activeTab === 'all' || activeTab === 'climate') searchClimate(q, results);

  // Pages — always local
  if (activeTab === 'all' || activeTab === 'pages') searchPages(q, results);

  renderResults(results, q);
}

/* ── Bird search: instant, against pre-built index ───────────────────────── */
function searchBirds(q, results) {
  if (!speciesIndex || speciesIndex.size === 0) return;
  var lower = q.toLowerCase();
  var words = lower.split(/\s+/).filter(function(w) { return w.length >= 2; });

  speciesIndex.forEach(function(sp) {
    var common = sp.common.toLowerCase();
    var sci = sp.scientific.toLowerCase();
    var score = 0;

    // Exact match
    if (common === lower || sci === lower) score = 100;
    // Starts with
    else if (common.startsWith(lower) || sci.startsWith(lower)) score = 85;
    // Contains full query
    else if (common.includes(lower) || sci.includes(lower)) score = 70;
    // Multi-word: all words present
    else if (words.length > 1 && words.every(function(w) { return common.includes(w) || sci.includes(w); })) score = 65;
    // Any word matches
    else if (words.some(function(w) { return common.includes(w) || sci.includes(w); })) score = 50;

    if (score > 0) {
      results.push({
        type: 'bird',
        score: score,
        title: sp.common,
        sub: sp.scientific + ' · detected ' + sp.count.toLocaleString('en-IN') + ' times · best confidence ' + (sp.bestConf * 100).toFixed(0) + '%',
        meta: 'Last heard ' + new Date(sp.lastSeen).toLocaleDateString('en-IN', { day:'numeric', month:'short', year:'numeric', timeZone:'Asia/Kolkata' }),
        url: 'species.html?bird=' + sp.scientific.replace(/ /g, '_'),
        icon: '🦜',
        sci: sp.scientific,
        newThisYear: sp.newThisYear,
      });
    }
  });
}

/* ── Climate search ──────────────────────────────────────────────────────── */
function searchClimate(q, results) {
  var lower = q.toLowerCase();
  for (var i = 0; i < CLIMATE_TERMS.length; i++) {
    var ct = CLIMATE_TERMS[i];
    if (ct.terms.some(function(t) { return lower.includes(t) || t.includes(lower); })) {
      results.push({ type:'climate', score:ct.score, title:ct.title, sub:ct.sub, url:ct.url, icon:'🌡️' });
    }
  }
}

/* ── Page search ─────────────────────────────────────────────────────────── */
function searchPages(q, results) {
  var lower = q.toLowerCase();
  var words = lower.split(/\s+/).filter(function(w) { return w.length >= 2; });

  for (var i = 0; i < PAGE_RESULTS.length; i++) {
    var p = PAGE_RESULTS[i];
    var score = 0;
    var titleLow = p.title.toLowerCase();
    var subLow = p.sub.toLowerCase();

    if (titleLow.includes(lower)) score = 90;
    else if (p.tags.some(function(t) { return t === lower; })) score = 80;
    else if (p.tags.some(function(t) { return t.includes(lower) || lower.includes(t); })) score = 60;
    else if (subLow.includes(lower)) score = 50;
    else if (words.length > 1 && words.every(function(w) {
      return titleLow.includes(w) || subLow.includes(w) || p.tags.some(function(t) { return t.includes(w); });
    })) score = 55;

    if (score > 0) results.push({ type:'page', score:score, title:p.title, sub:p.sub, url:p.url, icon:p.icon });
  }
}

/* ── Render results ──────────────────────────────────────────────────────── */
function renderResults(results, q) {
  var list = document.getElementById('results-list');

  // Deduplicate by URL
  var seen = {};
  var unique = [];
  for (var i = 0; i < results.length; i++) {
    if (!seen[results[i].url]) {
      seen[results[i].url] = true;
      unique.push(results[i]);
    }
  }
  // Sort by score desc
  unique.sort(function(a, b) { return b.score - a.score; });

  if (!unique.length) {
    var safeQ = escapeHTML(q);
    list.innerHTML = '<div class="search-empty">' +
      '<div class="search-empty-icon">🔍</div>' +
      '<p>No results for "<strong>' + safeQ + '</strong>"</p>' +
      '<p style="font-size:0.82rem;margin-top:0.5rem;">Try a bird species name, "monsoon", "Diwali", or "temperature".</p>' +
      (!dataReady ? '<p style="font-size:0.78rem;margin-top:0.75rem;color:var(--ep-tan);">Bird data is still loading — try again in a moment.</p>' : '') +
      '</div>';
    return;
  }

  var typeLabels = { bird:'Species', climate:'Climate', page:'Page' };
  var typeClass  = { bird:'type-bird', climate:'type-climate', page:'type-page' };

  var html = '<p class="results-count">Found <strong>' + unique.length + '</strong> result' + (unique.length !== 1 ? 's' : '') + ' for "<strong>' + escapeHTML(q) + '</strong>"</p>';

  for (var j = 0; j < unique.length; j++) {
    var r = unique[j];
    var iconHTML;
    if (r.sci) {
      var key = r.sci.replace(/ /g, '_');
      iconHTML = '<div id="rthumb-' + key + '" style="width:42px;height:42px;border-radius:var(--radius-sm);background:var(--ep-cream-dark);display:flex;align-items:center;justify-content:center;font-size:1.4rem;">' + r.icon + '</div>';
    } else {
      iconHTML = '<span>' + r.icon + '</span>';
    }

    html += '<a class="result-card" href="' + r.url + '">' +
      '<div class="result-icon ' + r.type + '">' + iconHTML + '</div>' +
      '<div class="result-body">' +
        '<div class="result-title">' + escapeHTML(r.title) +
          ' <span class="result-type ' + typeClass[r.type] + '">' + typeLabels[r.type] + '</span>' +
          (r.newThisYear ? ' <span class="result-type type-new">★ New this year</span>' : '') +
        '</div>' +
        '<div class="result-sub">' + escapeHTML(r.sub) + '</div>' +
        (r.meta ? '<div class="result-meta">' + escapeHTML(r.meta) + '</div>' : '') +
      '</div></a>';
  }

  list.innerHTML = html;

  // Load Wikipedia thumbnails async (non-blocking, best effort)
  unique.filter(function(r) { return r.sci; }).forEach(function(r) {
    loadWikiThumb(r.sci, r.title);
  });
}

/* ── Wikipedia thumbnail loader (best effort, never blocks) ──────────────── */
function loadWikiThumb(sci, title) {
  var key = sci.replace(/ /g, '_');
  var el = document.getElementById('rthumb-' + key);
  if (!el) return;

  var slug = encodeURIComponent(sci.replace(/ /g, '_'));
  fetch('https://en.wikipedia.org/api/rest_v1/page/summary/' + slug, { headers: { 'Accept': 'application/json' } })
    .then(function(res) { return res.ok ? res.json() : null; })
    .then(function(data) {
      if (data && data.thumbnail && data.thumbnail.source) {
        var img = document.createElement('img');
        img.src = data.thumbnail.source;
        img.className = 'result-thumb';
        img.alt = title;
        img.loading = 'lazy';
        img.onerror = function() { /* keep emoji fallback */ };
        img.onload = function() {
          if (el && el.parentNode) el.parentNode.replaceChild(img, el);
        };
      }
    })
    .catch(function() { /* silent — emoji fallback stays */ });
}

/* ── Utility ─────────────────────────────────────────────────────────────── */
function escapeHTML(str) {
  var div = document.createElement('div');
  div.textContent = str;
  return div.innerHTML;
}

/* ══════════════════════════════════════════════════════════════
   INIT
   ══════════════════════════════════════════════════════════════ */
(function init() {
  // Start building species index immediately (non-blocking)
  buildSpeciesIndex();

  // Check URL for ?q= param (shareable searches)
  var urlQ = new URLSearchParams(window.location.search).get('q');
  if (urlQ) {
    document.getElementById('search-input').value = urlQ;
    doSearch();
  }
})();
