<head>

  <meta name="description" id="page-desc" content="Bird species acoustically detected in Baner, Pune using BirdNET AI. Detailed detection logs, activity charts, AQI correlation, and ecological information.">

  <meta property="og:description" id="og-desc" content="Acoustic bird detections from Baner, Pune.">

  <meta property="og:image:width" content="1200">

  <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png">

  <script id="ld-species" type="application/ld+json">{}</script>
  <link rel="stylesheet" href="styles.css">
  <!-- Chart.js -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
  <!-- Leaflet for GBIF range map -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>

  <style>
    /* ── Species hero ── */
    .species-hero { position:relative; background:var(--ep-green); min-height:340px; display:flex; align-items:flex-end; overflow:hidden; }
    .species-hero-bg { position:absolute; inset:0; background-size:cover; background-position:center; filter:brightness(0.35); }
    .species-hero-content { position:relative; z-index:1; padding:2.5rem 2rem; max-width:1100px; width:100%; margin:0 auto; }
    .species-tag { font-size:0.72rem; font-weight:600; letter-spacing:0.1em; text-transform:uppercase; color:var(--ep-tan); margin-bottom:0.5rem; }
    .species-name { font-family:var(--serif); font-size:clamp(2rem,5vw,3.2rem); color:var(--ep-cream); line-height:1.1; margin-bottom:0.25rem; }
    .species-sci  { font-style:italic; font-size:1rem; color:rgba(242,240,230,0.6); margin-bottom:1rem; }
    .species-badges { display:flex; gap:0.5rem; flex-wrap:wrap; align-items:center; }
    .species-badge { font-size:0.72rem; font-weight:600; padding:4px 12px; border-radius:20px; }
    .badge-detected { background:rgba(242,240,230,0.15); color:var(--ep-cream); }
    .badge-conf { background:rgba(191,155,123,0.3); color:#ffe0c0; }
    .share-btn { display:inline-flex; align-items:center; gap:5px; background:rgba(191,155,123,0.25); color:var(--ep-cream); border:1px solid rgba(191,155,123,0.4); padding:4px 14px; border-radius:20px; font-size:0.75rem; font-weight:600; cursor:pointer; font-family:var(--sans); transition:background 0.15s; }
    .share-btn:hover { background:rgba(191,155,123,0.45); }
    .share-toast { position:fixed; bottom:2rem; left:50%; transform:translateX(-50%); background:var(--ep-green); color:var(--ep-cream); padding:0.65rem 1.5rem; border-radius:2rem; font-size:0.85rem; font-weight:500; z-index:9999; opacity:0; transition:opacity 0.3s; pointer-events:none; white-space:nowrap; }
    .share-toast.show { opacity:1; }

    /* ── Layout ── */
    .species-layout { display:grid; grid-template-columns:1fr 1.8fr; gap:2rem; }
    @media(max-width:800px){ .species-layout { grid-template-columns:1fr; } }

    /* ── Cards ── */
    .sidebar-card { background:var(--bg-card); border:1px solid var(--border); border-radius:var(--radius-lg); padding:1.25rem; margin-bottom:1rem; }
    .sidebar-card h3 { font-family:var(--serif); font-size:1rem; color:var(--ep-green); margin-bottom:0.75rem; }
    .fact-row { display:flex; justify-content:space-between; align-items:baseline; padding:0.4rem 0; border-bottom:1px solid var(--border); font-size:0.82rem; gap:0.5rem; }
    .fact-row:last-child { border-bottom:none; }
    .fact-label { color:var(--text-muted); white-space:nowrap; }
    .fact-val { font-weight:600; color:var(--ep-green); font-family:var(--mono); font-size:0.8rem; text-align:right; }

    /* ── Wiki ── */
    .wiki-img-wrap { background:var(--ep-cream-dark); border-radius:var(--radius-md); margin-bottom:0.85rem; display:flex; align-items:center; justify-content:center; overflow:hidden; min-height:100px; }
    .wiki-img-wrap img { width:100%; max-height:360px; object-fit:contain; display:block; }
    .wiki-extract { font-size:0.87rem; color:var(--text-muted); line-height:1.8; }
    .wiki-link { display:inline-flex; align-items:center; gap:5px; color:var(--ep-green); font-size:0.8rem; margin-top:0.75rem; text-decoration:none; }

    /* ── Eco tags ── */
    .eco-tags { display:flex; gap:0.4rem; flex-wrap:wrap; margin-bottom:0.85rem; }
    .eco-tag { font-size:0.7rem; font-weight:600; padding:3px 10px; border-radius:20px; background:rgba(33,67,50,0.08); color:var(--ep-green); border:1px solid rgba(33,67,50,0.15); text-decoration:none; display:inline-block; transition:background 0.15s; }
    .eco-tag:hover { background:rgba(33,67,50,0.16); }
    .eco-tag.migratory { background:rgba(59,130,246,0.08);  color:#1d4ed8; border-color:rgba(59,130,246,0.2); }
    .eco-tag.water     { background:rgba(6,182,212,0.08);   color:#0891b2; border-color:rgba(6,182,212,0.2); }
    .eco-tag.nocturnal { background:rgba(124,58,237,0.08);  color:#7c3aed; border-color:rgba(124,58,237,0.2); }
    .eco-tag.raptor    { background:rgba(234,88,12,0.08);   color:#c2410c; border-color:rgba(234,88,12,0.2); }

    /* ── Fun fact ── */
    .funfact-card { background:linear-gradient(135deg,rgba(33,67,50,0.05),rgba(191,155,123,0.08)); border:1px solid rgba(191,155,123,0.25); border-radius:var(--radius-lg); padding:1.1rem 1.25rem; margin-bottom:1rem; }
    .funfact-icon  { font-size:1.5rem; margin-bottom:0.4rem; }
    .funfact-title { font-size:0.68rem; font-weight:700; text-transform:uppercase; letter-spacing:0.1em; color:var(--ep-tan); margin-bottom:0.35rem; }
    .funfact-text  { font-size:0.84rem; color:var(--text-muted); line-height:1.75; }

    /* ── Chart blocks ── */
    .chart-block { background:var(--bg-card); border:1px solid var(--border); border-radius:var(--radius-lg); padding:1.25rem; margin-bottom:1rem; }
    .chart-title { font-family:var(--serif); font-size:1rem; color:var(--ep-green); margin-bottom:0.2rem; }
    .chart-sub { font-size:0.78rem; color:var(--text-muted); margin-bottom:1rem; }

    /* ── Hour heatmap ── */
    .hour-grid { display:grid; grid-template-columns:repeat(24,1fr); gap:2px; margin-bottom:4px; }
    .hour-cell { aspect-ratio:1; border-radius:2px; }
    .hour-label-row { display:flex; justify-content:space-between; margin-top:2px; }
    .hour-label-row span { font-family:var(--mono); font-size:0.55rem; color:var(--text-muted); }

    /* ── Timeline ── */
    .timeline { display:flex; flex-direction:column; max-height:320px; overflow-y:auto; }
    .tl-row { display:flex; align-items:center; gap:0.75rem; padding:0.45rem 0; border-bottom:1px solid var(--border); font-size:0.79rem; }
    .tl-row:last-child { border-bottom:none; }
    .tl-time { font-family:var(--mono); color:var(--text-muted); flex:1; min-width:140px; }
    .tl-conf { font-family:var(--mono); font-size:0.72rem; white-space:nowrap; }
    .tl-aqi  { font-size:0.7rem; color:var(--text-muted); }
    .tl-new  { font-size:0.6rem; background:#fef08a; color:#713f12; font-weight:700; padding:1px 6px; border-radius:10px; white-space:nowrap; }
    .tl-node { font-size:0.6rem; background:rgba(33,67,50,0.1); color:var(--ep-green); font-weight:600; padding:1px 6px; border-radius:10px; white-space:nowrap; }

    /* ── Node split ── */
    .node-bar { display:flex; height:10px; border-radius:5px; overflow:hidden; margin:0.5rem 0 0.25rem; }
    .node-bar-seg { transition:width 0.5s; }
    .node-legend { display:flex; gap:1rem; font-size:0.72rem; color:var(--text-muted); }
    .node-dot { width:8px; height:8px; border-radius:50%; display:inline-block; margin-right:4px; }

    /* ── Wow stat cards ── */
    .wow-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(140px,1fr)); gap:0.75rem; margin-bottom:1rem; }
    .wow-card { background:var(--bg-card); border:1px solid var(--border); border-radius:var(--radius-md); padding:0.85rem 1rem; text-align:center; }
    .wow-val { font-family:var(--serif); font-size:1.6rem; color:var(--ep-green); line-height:1; }
    .wow-label { font-size:0.65rem; font-weight:600; letter-spacing:0.07em; text-transform:uppercase; color:var(--text-muted); margin-top:0.25rem; }

    /* ── Related grid ── */
    .related-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(140px,1fr)); gap:0.75rem; }
    .related-card { background:var(--bg-card); border:1px solid var(--border); border-radius:var(--radius-md); padding:0.75rem; text-align:center; text-decoration:none; transition:box-shadow 0.15s,transform 0.15s; display:block; }
    .related-card:hover { box-shadow:0 4px 16px rgba(33,67,50,0.1); transform:translateY(-2px); }
    .related-thumb { width:56px; height:56px; border-radius:50%; overflow:hidden; background:var(--ep-cream-dark); margin:0 auto 0.5rem; display:flex; align-items:center; justify-content:center; font-size:1.6rem; }
    .related-thumb img { width:56px; height:56px; border-radius:50%; object-fit:cover; display:block; }
    .related-card-name { font-size:0.75rem; font-weight:600; color:var(--ep-green); }
    .related-card-sci  { font-size:0.63rem; font-style:italic; color:var(--text-muted); margin-top:1px; }

    /* ── Species index ── */
    .species-index-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(200px,1fr)); gap:1rem; }
    .si-card { background:var(--bg-card); border:1px solid var(--border); border-radius:var(--radius-lg); overflow:hidden; text-decoration:none; display:block; transition:box-shadow 0.2s,transform 0.2s; color:inherit; }
    .si-card:hover { box-shadow:0 6px 24px rgba(33,67,50,0.12); transform:translateY(-2px); }
    .si-photo { width:100%; height:130px; object-fit:cover; display:block; background:var(--ep-cream-dark); }
    .si-emoji { width:100%; height:130px; display:flex; align-items:center; justify-content:center; font-size:3rem; background:linear-gradient(135deg,rgba(33,67,50,0.07),rgba(191,155,123,0.1)); }
    .si-body { padding:0.85rem 1rem; }

    /* ── Not found ── */
    .not-found { text-align:center; padding:5rem 2rem; }
    .not-found h2 { font-family:var(--serif); font-size:1.8rem; color:var(--ep-green); margin-bottom:0.5rem; }
    .not-found p { color:var(--text-muted); line-height:1.7; }

    /* ── Pagination ── */
    .pag-btn { padding:0.4rem 0.9rem; border-radius:var(--radius-sm); border:1px solid var(--border-strong); background:transparent; font-family:var(--sans); font-size:0.82rem; color:var(--ep-green); cursor:pointer; transition:all 0.15s; }
    .pag-btn:hover { background:var(--ep-green); color:var(--ep-cream); border-color:var(--ep-green); }
    .pag-btn[disabled] { opacity:0.35; pointer-events:none; }
    .pag-info { font-family:var(--mono); font-size:0.78rem; color:var(--text-muted); }

    /* ── SEO context ── */
    .seo-context { max-width:1100px; margin:0 auto; padding:0 2rem 2rem; font-size:0.78rem; color:var(--text-muted); line-height:1.7; border-top:1px solid var(--border); padding-top:1.5rem; }
    .seo-context h2 { font-size:0.85rem; font-weight:600; color:var(--ep-green); margin-bottom:0.5rem; }

    /* ════════════════════════════════════════════
       NEW: GBIF Range Map
    ════════════════════════════════════════════ */
    .range-map-wrap {
      border-radius:var(--radius-md);
      overflow:hidden;
      height:280px;
      border:1px solid var(--border);
      position:relative;
      background:#e8f0e9;
    }
    @media(max-width:600px){ .range-map-wrap { height:220px; } }
    #range-map { width:100%; height:100%; }
    .range-map-attribution {
      font-size:0.65rem;
      color:var(--text-muted);
      margin-top:0.4rem;
      line-height:1.5;
    }
    .range-map-loading {
      position:absolute; inset:0; display:flex; align-items:center; justify-content:center;
      background:rgba(242,240,230,0.85); z-index:10; font-size:0.8rem; color:var(--ep-green);
      font-weight:500; gap:0.4rem;
    }
    .map-spinner {
      width:16px; height:16px; border:2px solid rgba(33,67,50,0.2);
      border-top-color:var(--ep-green); border-radius:50%;
      animation:spin 0.7s linear infinite;
    }
    @keyframes spin { to { transform:rotate(360deg); } }
    .range-map-error {
      display:flex; align-items:center; justify-content:center;
      height:100%; font-size:0.8rem; color:var(--text-muted);
      flex-direction:column; gap:0.5rem; padding:1rem; text-align:center;
    }

    /* ════════════════════════════════════════════
       NEW: FAQ Accordion
    ════════════════════════════════════════════ */
    .faq-list { list-style:none; padding:0; margin:0; display:flex; flex-direction:column; gap:0.4rem; }
    .faq-item { border:1px solid var(--border); border-radius:var(--radius-md); overflow:hidden; }
    .faq-q {
      width:100%; background:none; border:none; padding:0.85rem 1rem;
      display:flex; justify-content:space-between; align-items:center;
      font-family:var(--sans); font-size:0.85rem; font-weight:600;
      color:var(--ep-green); cursor:pointer; text-align:left; gap:0.5rem;
      transition:background 0.15s;
    }
    .faq-q:hover { background:rgba(33,67,50,0.04); }
    .faq-q[aria-expanded="true"] { background:rgba(33,67,50,0.05); }
    .faq-chevron {
      flex-shrink:0; width:16px; height:16px; transition:transform 0.2s;
      color:var(--ep-tan);
    }
    .faq-q[aria-expanded="true"] .faq-chevron { transform:rotate(180deg); }
    .faq-a {
      font-size:0.83rem; color:var(--text-muted); line-height:1.8;
      padding:0 1rem 0.9rem; display:none;
    }
    .faq-a.open { display:block; }
    .faq-a a { color:var(--ep-green); }

    /* ════════════════════════════════════════════
       NEW: Habitat Support / How to Help
    ════════════════════════════════════════════ */
    .support-intro {
      font-size:0.84rem; color:var(--text-muted); line-height:1.8;
      margin-bottom:1rem;
    }
    .support-trees { display:flex; flex-direction:column; gap:0.6rem; margin-bottom:1rem; }
    .tree-card {
      display:flex; align-items:flex-start; gap:0.75rem;
      background:linear-gradient(135deg,rgba(33,67,50,0.04),rgba(191,155,123,0.05));
      border:1px solid rgba(33,67,50,0.1); border-radius:var(--radius-md);
      padding:0.75rem 0.85rem;
    }
    .tree-icon { font-size:1.4rem; flex-shrink:0; line-height:1; margin-top:2px; }
    .tree-info { flex:1; min-width:0; }
    .tree-name { font-size:0.84rem; font-weight:700; color:var(--ep-green); margin-bottom:0.1rem; }
    .tree-sci  { font-style:italic; font-size:0.72rem; color:var(--text-muted); margin-bottom:0.25rem; }
    .tree-why  { font-size:0.78rem; color:var(--text-muted); line-height:1.6; margin-bottom:0.3rem; }
    .tree-link {
      display:inline-flex; align-items:center; gap:3px;
      font-size:0.7rem; font-weight:600; color:var(--ep-green);
      text-decoration:none; border:1px solid rgba(33,67,50,0.2);
      padding:2px 8px; border-radius:10px; transition:background 0.15s;
    }
    .tree-link:hover { background:rgba(33,67,50,0.08); }
    .support-actions { display:flex; flex-direction:column; gap:0.5rem; }
    .support-action-item {
      display:flex; align-items:flex-start; gap:0.6rem;
      font-size:0.82rem; color:var(--text-muted); line-height:1.6;
    }
    .action-icon { flex-shrink:0; font-size:1rem; }
    .support-source {
      font-size:0.7rem; color:var(--text-muted);
      border-top:1px solid var(--border); padding-top:0.6rem; margin-top:0.75rem;
      line-height:1.6;
    }
    /* ════════════════════════════════════════════
       NEW: In its own words (voice card)
    ════════════════════════════════════════════ */
    .voice-card {
      background: linear-gradient(135deg, rgba(33,67,50,0.06), rgba(191,155,123,0.1));
      border: 1px solid rgba(191,155,123,0.3);
      border-left: 4px solid var(--ep-tan);
      border-radius: var(--radius-lg);
      padding: 1.25rem 1.4rem;
      margin-bottom: 1.25rem;
      position: relative;
    }
    .voice-card-label {
      font-size: 0.66rem; font-weight: 700; letter-spacing: 0.1em;
      text-transform: uppercase; color: var(--ep-tan);
      margin-bottom: 0.5rem;
      display: flex; align-items: center; gap: 0.4rem;
    }
    .voice-card-text {
      font-family: var(--serif); font-style: italic;
      font-size: 1.02rem; color: var(--ep-green); line-height: 1.7;
    }
    .voice-card-text strong { font-style: normal; color: var(--ep-tan); font-weight: 600; }

    /* ════════════════════════════════════════════
       NEW: Rank badge in hero
    ════════════════════════════════════════════ */
    .badge-rank {
      background: rgba(191,155,123,0.18);
      color: #ffe0c0;
      border: 1px solid rgba(191,155,123,0.35);
    }

    /* ════════════════════════════════════════════
       NEW: Phenology pill in at-a-glance
    ════════════════════════════════════════════ */
    .phenology-pill {
      display: inline-block;
      background: rgba(33,67,50,0.07);
      border: 1px solid rgba(33,67,50,0.18);
      color: var(--ep-green);
      font-size: 0.75rem; font-weight: 600;
      padding: 3px 10px; border-radius: 20px;
    }
    .phenology-pill.winter { background: rgba(59,130,246,0.08); color: #1d4ed8; border-color: rgba(59,130,246,0.2); }
    .phenology-pill.monsoon { background: rgba(6,182,212,0.08); color: #0891b2; border-color: rgba(6,182,212,0.2); }
    .phenology-pill.summer { background: rgba(234,88,12,0.08); color: #c2410c; border-color: rgba(234,88,12,0.2); }

    /* ════════════════════════════════════════════
       NEW: Sound action buttons
    ════════════════════════════════════════════ */
    .sound-actions {
      display: flex; flex-wrap: wrap; gap: 0.5rem;
      margin-top: 0.85rem; padding-top: 0.85rem;
      border-top: 1px solid var(--border);
    }
    .sound-btn {
      display: inline-flex; align-items: center; gap: 5px;
      background: var(--ep-cream-dark);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 6px 12px;
      font-size: 0.76rem; font-weight: 600;
      color: var(--ep-green);
      text-decoration: none;
      transition: background 0.15s;
    }
    .sound-btn:hover { background: rgba(33,67,50,0.08); }
    .sound-btn-icon { font-size: 0.9rem; line-height: 1; }

    /* ════════════════════════════════════════════
       NEW: Co-occurring birds (heard alongside)
    ════════════════════════════════════════════ */
    .cooccur-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(170px, 1fr));
      gap: 0.6rem;
      margin-top: 0.5rem;
    }
    .cooccur-card {
      display: flex; align-items: center; gap: 0.65rem;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius-md);
      padding: 0.55rem 0.7rem;
      text-decoration: none; color: inherit;
      transition: box-shadow 0.15s, transform 0.15s;
    }
    .cooccur-card:hover { box-shadow: 0 3px 12px rgba(33,67,50,0.1); transform: translateY(-1px); }
    .cooccur-thumb {
      width: 42px; height: 42px; border-radius: 50%;
      flex-shrink: 0;
      background: var(--ep-cream-dark);
      display: flex; align-items: center; justify-content: center;
      font-size: 1.2rem;
      overflow: hidden;
    }
    .cooccur-thumb img { width: 42px; height: 42px; border-radius: 50%; object-fit: cover; display: block; }
    .cooccur-info { flex: 1; min-width: 0; }
    .cooccur-name {
      font-size: 0.78rem; font-weight: 600; color: var(--ep-green);
      overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    }
    .cooccur-count {
      font-family: var(--mono); font-size: 0.65rem; color: var(--text-muted);
    }
    .cooccur-empty {

function istHour(ts) {
  var d = new Date(ts);
  return Math.floor((d.getTime() + d.getTimezoneOffset()*60000 + 5.5*3600000)/3600000) % 24;
}
function istMonth(ts) {
  var d = new Date(ts);
  return new Date(d.getTime() + d.getTimezoneOffset()*60000 + 5.5*3600000).getMonth();
}
function fmtIST(ts, opts) {
  return new Date(ts).toLocaleString('en-IN', Object.assign({}, opts, {timeZone:'Asia/Kolkata'}));

function ge(id) { return document.getElementById(id); }

async function fetchAll(path, batchSize) {
  var all = [], offset = 0, batch = batchSize || 1000;
  while (true) {
    var rangeEnd = offset + batch - 1;
    var res = await fetch(SB + path + '&limit=' + batch + '&offset=' + offset, {
      headers: Object.assign({}, H, {'Range-Unit':'items','Range':offset+'-'+rangeEnd})
    });
    if (!res.ok) throw new Error('HTTP ' + res.status);
    var rows = await res.json();
    if (!Array.isArray(rows) || !rows.length) break;
    all = all.concat(rows);
    if (rows.length < batch) break;
    offset += batch;
  }
  return all;
}

async function fetchWiki(sci) {
  try {

    var d = await r.json();

      extract: d.extract || '',

}

/* ── Eco tags ─────────────────────────────────────────────────────────────── */
var MIGRATORY_WORDS = ['warbler','martin','swift','pipit','bee-eater','flycatcher','redstart','wagtail','chat','stint','swallow'];

var RAPTOR_WORDS    = ['kite','hawk','eagle','falcon','osprey','kestrel','harrier','buzzard','shikra'];
var NOCTURNAL_WORDS = ['nightjar','owl','nightheron','frogmouth'];

function getEcoTags(name, sci) {
  var l = (name + ' ' + sci).toLowerCase();
  var tags = [];
  if (RAPTOR_WORDS.some(function(w){return l.indexOf(w)!==-1;}))    tags.push({label:'Raptor',     cls:'raptor'});
  if (MIGRATORY_WORDS.some(function(w){return l.indexOf(w)!==-1;})) tags.push({label:'Migratory',  cls:'migratory'});
  if (WATER_WORDS.some(function(w){return l.indexOf(w)!==-1;}))     tags.push({label:'Water bird', cls:'water'});
  if (NOCTURNAL_WORDS.some(function(w){return l.indexOf(w)!==-1;})) tags.push({label:'Nocturnal',  cls:'nocturnal'});
  if (tags.length === 0) tags.push({label:'Resident', cls:''});
  return tags;
}

async function fetchGbifKey(sci) {
  try {
    var r = await fetch('https://api.gbif.org/v1/species/match?name=' + encodeURIComponent(sci) + '&class=Aves&rank=SPECIES');
    if (!r.ok) return null;
    var d = await r.json();
    return d.usageKey || null;
  } catch(e) { return null; }
}

function initRangeMap(containerId, taxonKey, name, sci) {
  var wrap = ge(containerId);
  if (!wrap) return;

  var loadingEl = wrap.querySelector('.range-map-loading');
  var mapEl     = wrap.querySelector('#range-map');

  if (!taxonKey) {
    if (loadingEl) loadingEl.remove();
    if (mapEl) mapEl.innerHTML = '<div class="range-map-error"><span style="font-size:1.5rem">🌍</span><span>Global range map unavailable for this species.</span></div>';
    return;
  }

  // Initialise Leaflet — start at India-region zoom for immediate context
  var map = L.map('range-map', {
    center: [20, 78],   // centre on India
    zoom: 4,            // sub-continental view
    zoomControl: true,
    attributionControl: false,
    scrollWheelZoom: false   // avoid accidental scroll-hijack on mobile
  });

  // Base tiles: CartoDB Positron — clean, light, matches EP palette
  L.tileLayer('https://{s}.basemaps.cartocdn.com/light_nolabels/{z}/{x}/{y}{r}.png', {
    subdomains: 'abcd',
    maxZoom: 8
  }).addTo(map);

  // GBIF occurrence density tiles
  var gbifUrl = 'https://api.gbif.org/v2/map/occurrence/density/{z}/{x}/{y}@1x.png'
    + '?style=scaled.circles&taxonKey=' + taxonKey;

  L.tileLayer(gbifUrl, {
    opacity: 0.85,
    maxZoom: 8
  }).on('tileload', function() {
    if (loadingEl) { loadingEl.remove(); loadingEl = null; }
  }).on('tileerror', function() {
    if (loadingEl) { loadingEl.remove(); loadingEl = null; }
  }).addTo(map);

  // Baner marker
  var banerIcon = L.divIcon({
    className: '',
    html: '<div style="width:12px;height:12px;background:#214332;border:2.5px solid #f2f0e6;border-radius:50%;box-shadow:0 0 0 3px rgba(33,67,50,0.3);"></div>',
    iconSize: [12,12],
    iconAnchor: [6,6]
  });
  L.marker([18.5526, 73.7819], {icon: banerIcon})
    .bindPopup('<strong style="color:#214332">' + name + '</strong><br><em style="color:#888;font-size:0.75rem">' + sci + '</em><br><span style="font-size:0.75rem;color:#555">Detected at Earth Pulse,<br>Baner, Pune</span>', {
      maxWidth: 160,
      className: 'ep-map-popup'
    })
    .addTo(map);

  // Remove loading overlay after a timeout fallback
  setTimeout(function() {
    if (loadingEl && loadingEl.parentNode) { loadingEl.remove(); loadingEl = null; }
  }, 4000);
}

/* Convert hour to friendly 12h string */
function fmtHour12(h) {
  if (h === 0) return '12 AM';
  if (h === 12) return '12 PM';
  if (h < 12) return h + ' AM';
  return (h-12) + ' PM';
}

/* Determine phenology from monC counts */
function getPhenology(monC, total) {
  if (!total) return {label:'No data', cls:''};
  var monsoonShare = (monC[5]+monC[6]+monC[7]+monC[8]) / total;
  var winterShare  = (monC[9]+monC[10]+monC[11]+monC[0]+monC[1]) / total;
  var summerShare  = (monC[2]+monC[3]+monC[4]) / total;
  var activeMonths = monC.filter(function(c){return c > 0;}).length;

  if (activeMonths >= 9) return {label:'Heard year-round', cls:''};
  if (winterShare > 0.7) return {label:'Winter visitor', cls:'winter'};
  if (monsoonShare > 0.7) return {label:'Monsoon peak', cls:'monsoon'};
  if (summerShare > 0.6) return {label:'Summer peak', cls:'summer'};
  if (activeMonths <= 4) return {label:'Seasonal visitor', cls:''};
  return {label:'Mostly resident', cls:''};
}

/* Build the "in its own words" voice card text */
function buildVoiceText(name, sci, total, peakH, monC, dawnPct, nightN, southPct, total_) {
  var voice = '<strong>"</strong>';
  // Lead with name/identity
  voice += 'I\'m the ' + name + '. ';

  // Heard pattern
  if (total === 1) {
    voice += 'I\'ve only been heard once on Baner Hill so far — a rare passing call. ';
  } else if (total < 10) {
    voice += 'I\'ve been heard ' + total + ' times so far — still uncommon on the hill. ';
  } else if (total < 50) {
    voice += 'Earth Pulse has caught my voice <strong>' + total + ' times</strong>. ';
  } else {
    voice += 'My voice has been picked up <strong>' + total.toLocaleString('en-IN') + ' times</strong> — I\'m a regular here. ';
  }

  // When am I most active
  if (dawnPct > 50) {
    voice += 'I love the dawn chorus — most of my calls happen between 5 and 8 AM, when the hill wakes up. ';
  } else if (nightN > total * 0.4) {
    voice += 'I\'m a creature of the night — most of my calls come between 9 PM and 5 AM, when the city sleeps. ';
  } else if (peakH >= 17 && peakH <= 20) {
    voice += 'I prefer the cool of evening — you\'re most likely to hear me around ' + fmtHour12(peakH) + '. ';
  } else {
    voice += 'You\'re most likely to hear me around <strong>' + fmtHour12(peakH) + '</strong>. ';
  }

  // Sensor location preference
  if (southPct > 60) {
    voice += 'I forage closer to the south slope of Baner Hill — that\'s where the south-facing sensor catches me most. ';
  } else if (southPct < 20 && southPct > 0) {
    voice += 'I stay around the east-facing balcony — closer to the homes and gardens of Baner. ';
  }

  voice += '<strong>"</strong>';
  return voice;
}

/* Phenology label as plain text for SEO/AI */
function getPhenologySentence(name, phen, peakH, peakM, monC, total) {
  if (phen.label === 'Heard year-round') {
    return name + ' is a year-round resident in Baner, Pune — detected in every month of the year.';
  }
  if (phen.label === 'Winter visitor') {
    return name + ' is a winter visitor to Baner, Pune — primarily detected between October and February.';
  }
  if (phen.label === 'Monsoon peak') {
    return name + ' peaks during the monsoon season (June–September) in Baner, Pune.';
  }
  if (phen.label === 'Summer peak') {
    return name + ' is most active during the summer months (March–May) in Baner, Pune.';
  }
  if (phen.label === 'Seasonal visitor') {
    return name + ' appears seasonally in Baner — detected during ' + monC.filter(function(c){return c>0;}).length + ' months of the year.';
  }
  return name + ' is mostly resident in Baner, Pune.';
}

/* External sound and citizen-science links */
function buildSoundLinksHtml(sci, name) {
  var sciSlug = sci.replace(/ /g,'+');
  var sciUnderscore = sci.replace(/ /g,'_');
  return '<div class="sound-actions" role="group" aria-label="Listen to and learn more about this species">'
    + '<a class="sound-btn" href="https://xeno-canto.org/explore?query=' + encodeURIComponent(sci) + '" target="_blank" rel="noopener" aria-label="Listen to ' + name + ' calls on Xeno-canto">'
    + '<span class="sound-btn-icon">🔊</span> Hear my call (Xeno-canto)</a>'
    + '</div>';
}

/* Best-effort eBird species slug: lowercase first word + first letter of others */
/* eBird uses 6-char codes (e.g. "rvbulb1" for Red-vented Bulbul) which we cannot reliably */
/* construct from scientific name. So we send users to a search URL instead. */
function sciToEbirdSlug(sci) {
  // Falls back to general search if direct slug doesn't exist
  return encodeURIComponent(sci.toLowerCase().replace(/ /g,'-'));
}

        'isAccessibleForFree': true,
        'creator': {'@type':'Organization','name':'Earth Pulse Project','url':'https://earth-pulse.org'},

function updateMeta(name, sci, total, best, wikiExtract, wikiThumb) {
  var pageUrl = 'https://earth-pulse.org/species.html?bird=' + encodeURIComponent(sci.replace(/ /g,'_'));
  var desc = name + ' (' + sci + ') detected ' + total.toLocaleString('en-IN') + ' times in Baner, Pune by BirdNET acoustic AI. ' + (wikiExtract ? wikiExtract.slice(0,140) : 'Western Ghats biodiversity monitoring from the Sahyadri foothills.');
  // Dynamic title includes count — freshness signal
  document.title = name + ' (' + sci + ') — Heard ' + total.toLocaleString('en-IN') + (total===1?' time':' times') + ' in Baner, Pune | Earth Pulse';
  var setMeta = function(sel, val) { var el = document.querySelector(sel); if (el) el.setAttribute('content', val); };
  setMeta('meta[name="description"]', desc);
  setMeta('meta[property="og:title"]', name + ' — Heard ' + total.toLocaleString('en-IN') + ' times in Baner, Pune');
  setMeta('meta[property="og:description"]', desc);
  setMeta('meta[property="og:url"]', pageUrl);
  var canon = ge('page-canonical'); if (canon) canon.href = pageUrl;
  if (wikiThumb) {
    setMeta('meta[property="og:image"]', wikiThumb);
    setMeta('meta[name="twitter:image"]', wikiThumb);
  }
}

/* ════════════════════════════════════════════════════════════════════════════
   INDEX PAGE
════════════════════════════════════════════════════════════════════════════ */
async function renderIndex() {
  document.title = 'Bird Species — Earth Pulse, Baner, Pune';
  try {
    var rows = await fetchAll('/rest/v1/bird_detections?select=species_common,species_scientific,confidence&order=detected_at.desc', 1000);
    if (!rows.length) { showError('Could not load species', 'No data returned'); return; }
    var map = {};
    rows.forEach(function(r){ if (!map[r.species_scientific] || r.confidence > map[r.species_scientific].confidence) map[r.species_scientific] = r; });
    var species = Object.values(map).sort(function(a,b){return a.species_common.localeCompare(b.species_common);});
    var IDX_PAGE_SIZE = 24;
    var idxPage = 0;

    function renderIdxPage() {
      var start = idxPage * IDX_PAGE_SIZE;
      var slice = species.slice(start, start + IDX_PAGE_SIZE);
      var total = species.length;
      var maxPg = Math.ceil(total / IDX_PAGE_SIZE) - 1;
      var cards = slice.map(function(sp, i) {
        var idx = start + i;
        return '<a class="si-card" href="species.html?bird=' + sp.species_scientific.replace(/ /g,'_') + '" aria-label="' + sp.species_common + ' species profile">'
          + '<div class="si-emoji" id="si-' + idx + '">🦜</div>'
          + '<div class="si-body"><div class="ep-bird-name">' + sp.species_common + '</div>'
          + '<div class="ep-bird-sci">' + sp.species_scientific + '</div>'
          + '<div class="ep-bird-conf">' + (sp.confidence*100).toFixed(0) + '% best confidence</div>'
          + '</div></a>';
      }).join('');
      var pagerHtml = '';
      if (total > IDX_PAGE_SIZE) {
        pagerHtml = '<div style="display:flex;align-items:center;justify-content:center;gap:0.5rem;margin-top:1.5rem;flex-wrap:wrap;" role="navigation" aria-label="Species pages">'
          + '<button class="pag-btn" onclick="goIdxPage(' + (idxPage-1) + ')" ' + (idxPage===0?'disabled':'') + ' aria-label="Previous page">← Prev</button>'
          + '<span class="pag-info">' + (start+1) + '–' + Math.min(start+IDX_PAGE_SIZE,total) + ' of ' + total + ' species</span>'
          + '<button class="pag-btn" onclick="goIdxPage(' + (idxPage+1) + ')" ' + (idxPage>=maxPg?'disabled':'') + ' aria-label="Next page">Next →</button>'
          + '</div>';
      }
      var grid = ge('idx-grid'); if (grid) { grid.innerHTML = cards; var pEl = ge('idx-pager'); if (pEl) pEl.innerHTML = pagerHtml; }
      slice.forEach(function(sp, i) {
        var idx = start + i;
        fetchWiki(sp.species_scientific).then(function(w) {
          var el = ge('si-' + idx);
          if (el && w && w.thumb) el.outerHTML = '<img class="si-photo" src="' + w.thumb + '" alt="' + sp.species_common + ' (' + sp.species_scientific + ') detected in Baner, Pune" loading="lazy">';
        });
      });
    }

    window.goIdxPage = function(p) {
      var maxPg = Math.ceil(species.length / IDX_PAGE_SIZE) - 1;
      if (p < 0 || p > maxPg) return;
      idxPage = p; renderIdxPage(); window.scrollTo({top:0,behavior:'smooth'});
    };

    ge('main-content').innerHTML =
      '<div class="ep-hero"><div class="ep-hero-tag">Acoustic monitoring · BirdNET AI · Baner, Pune</div>'
      + '<h1>Birds of Baner, Pune</h1>'
      + '<p class="ep-hero-sub">Every species identified by sound from the Sahyadri foothills. Click any bird for the full profile.</p>'
      + '<p class="ep-hero-meta"><strong>' + species.length + '</strong> species · <strong>' + rows.length.toLocaleString('en-IN') + '</strong> total detections</p></div>'
      + '<div class="ep-section"><div class="ep-section-inner">'
      + '<div class="species-index-grid" id="idx-grid"></div>'
      + '<div id="idx-pager"></div>'
      + '</div></div>';
    renderIdxPage();
  } catch(e) { showError('Failed to load species index', e.message); }
}

/* ════════════════════════════════════════════════════════════════════════════
   SPECIES PAGE
════════════════════════════════════════════════════════════════════════════ */
async function renderSpeciesPage(sci) {
  var detections, w;
  try {
    var results = await Promise.all([
      fetchAll('/rest/v1/bird_detections?select=*&species_scientific=eq.' + encodeURIComponent(sci) + '&order=detected_at.desc', 1000),
      fetchWiki(sci)
    ]);
    detections = results[0]; w = results[1];
  } catch(e) { showError('Network error', e.message); return; }

  if (!Array.isArray(detections)) { showError('Database error', JSON.stringify(detections).slice(0,200)); return; }
  if (!detections.length) { showError('Species not found', 'No detections for <em>' + sci + '</em>. <a href="birds.html" style="color:var(--ep-green)">Browse all birds</a>.'); return; }

  var name = detections[0].species_common;
  var total = detections.length;
  var best = 0, sumConf = 0;
  for (var i = 0; i < detections.length; i++) { if (detections[i].confidence > best) best = detections[i].confidence; sumConf += detections[i].confidence; }
  var avgConf = sumConf / total;

  var first = new Date(detections[detections.length-1].detected_at);
  var last  = new Date(detections[0].detected_at);
  var daysSpan = Math.max(1, Math.round((last - first) / 86400000));

  var hourC = new Array(24).fill(0), monC = new Array(12).fill(0);
  for (var j = 0; j < detections.length; j++) { hourC[istHour(detections[j].detected_at)]++; monC[istMonth(detections[j].detected_at)]++; }
  var maxH  = Math.max.apply(null, hourC.concat([1]));
  var peakH = hourC.indexOf(Math.max.apply(null, hourC));
  var peakM = monC.indexOf(Math.max.apply(null, monC));
  var actMonths = MO.filter(function(_,idx){return monC[idx]>0;}).join(', ');

  var withAqi = detections.filter(function(x){return x.aqi_at_detection != null;});
  var avgAqi = withAqi.length ? Math.round(withAqi.reduce(function(s,x){return s + x.aqi_at_detection;},0) / withAqi.length) : null;
  var minAqi = withAqi.length ? Math.min.apply(null, withAqi.map(function(x){return x.aqi_at_detection;})) : null;
  var maxAqi = withAqi.length ? Math.max.apply(null, withAqi.map(function(x){return x.aqi_at_detection;})) : null;
  var goodPct = withAqi.length ? Math.round(withAqi.filter(function(x){return x.aqi_at_detection<=40;}).length/withAqi.length*100) : null;
  var poorPct = withAqi.length ? Math.round(withAqi.filter(function(x){return x.aqi_at_detection>=80;}).length/withAqi.length*100) : null;

  var withTemp = detections.filter(function(x){return x.temperature_at_detection != null;});
  var avgTemp = withTemp.length ? (withTemp.reduce(function(s,x){return s + x.temperature_at_detection;},0) / withTemp.length).toFixed(1) : null;
  var minTemp = withTemp.length ? Math.min.apply(null,withTemp.map(function(x){return x.temperature_at_detection;})).toFixed(1) : null;
  var maxTemp = withTemp.length ? Math.max.apply(null,withTemp.map(function(x){return x.temperature_at_detection;})).toFixed(1) : null;

  var nodeCounts = {};
  detections.forEach(function(x){ var n = x.node_id || 'baner_01'; nodeCounts[n] = (nodeCounts[n]||0) + 1; });
  var southN  = nodeCounts['baner_south_01'] || 0;
  var mainN   = total - southN;
  var southPct = Math.round(southN / total * 100);

  var dawnN=0, duskN=0, nightN=0, dayN=0;
  detections.forEach(function(x){ var h = istHour(x.detected_at); if (h>=5&&h<=8) dawnN++; else if (h>=17&&h<=20) duskN++; else if (h>=21||h<=4) nightN++; else dayN++; });

  var sorted = detections.slice().sort(function(a,b){return new Date(a.detected_at)-new Date(b.detected_at);});
  var maxGap = 0;
  for (var k = 1; k < sorted.length; k++) {
    var gap = Math.round((new Date(sorted[k].detected_at) - new Date(sorted[k-1].detected_at)) / 86400000);
    if (gap > maxGap) maxGap = gap;
  }

  var hasAnyNewFlag = detections.some(function(x){return x.is_new_species_this_year;});
  var earliestTs = detections[detections.length-1].detected_at;

  /* ── NEW: Phenology ── */
  var phenology = getPhenology(monC, total);
  var phenologySentence = getPhenologySentence(name, phenology, peakH, peakM, monC, total);

  /* ── NEW: 30-day trend ── */
  var now30 = Date.now() - 30*86400000;
  var prev30 = Date.now() - 60*86400000;
  var last30Count = 0, prev30Count = 0;
  detections.forEach(function(x){
    var t = new Date(x.detected_at).getTime();
    if (t >= now30) last30Count++;
    else if (t >= prev30) prev30Count++;
  });
  var trendArrow = '→', trendCls = 'flat', trendText = '';
  if (prev30Count === 0 && last30Count > 0) {
    trendArrow = '↑'; trendCls = 'up';
    trendText = 'newly active — ' + last30Count + ' detection' + (last30Count!==1?'s':'') + ' in the last 30 days, none in the 30 days before';
  } else if (last30Count === 0 && prev30Count > 0) {
    trendArrow = '↓'; trendCls = 'down';
    trendText = 'gone quiet — no detections in the last 30 days (' + prev30Count + ' in the prior 30)';
  } else if (prev30Count > 0) {
    var trendPct = Math.round((last30Count - prev30Count) / prev30Count * 100);
    if (trendPct > 20)      { trendArrow = '↑'; trendCls = 'up';   trendText = 'up ' + Math.abs(trendPct) + '% in the last 30 days vs the prior 30'; }
    else if (trendPct < -20){ trendArrow = '↓'; trendCls = 'down'; trendText = 'down ' + Math.abs(trendPct) + '% in the last 30 days vs the prior 30'; }
    else                    { trendArrow = '→'; trendCls = 'flat'; trendText = 'stable activity over the last 60 days'; }
  } else if (total > 0) {
    trendText = 'historical record only — no recent detections to compare';
  }

  updateMeta(name, sci, total, best, w ? w.extract : null, w ? w.thumb : null);
  injectStructuredData(name, sci, total, best, detections[detections.length-1].detected_at, detections[0].detected_at, w ? w.url : null, w ? w.extract.slice(0,200) : null);

  var ecoTags = getEcoTags(name, sci);
  var ecoHtml = '<div class="eco-tags">' + ecoTags.map(function(t){
    return '<a class="eco-tag ' + t.cls + '" href="birds.html?filter=' + encodeURIComponent(t.label.toLowerCase()) + '" title="See all ' + t.label + ' birds">' + t.label + ' ↗</a>';
  }).join('') + '</div>';

  var fact = getFunFact(name, sci, peakH, total, avgConf);
  var factHtml = '<div class="funfact-card"><div class="funfact-icon">' + fact.icon + '</div><div class="funfact-title">' + fact.title + '</div><div class="funfact-text">' + fact.text + '</div></div>';

  var wikiHtml = '<div class="sidebar-card"><h3>About this species</h3>' + ecoHtml;
  if (w) {
    if (w.thumb) wikiHtml += '<div class="wiki-img-wrap"><img src="' + w.thumb + '" alt="' + name + ' (' + sci + ')" loading="lazy"></div>';
    wikiHtml += '<p class="wiki-extract">' + w.extract + '</p><a class="wiki-link" href="' + w.url + '" target="_blank" rel="noopener">Read more on Wikipedia →</a>';
  } else {
    wikiHtml += '<p style="font-size:0.84rem;color:var(--text-muted);">Wikipedia article not found for this species.</p>';
  }
  wikiHtml += '</div>';

  var aqiHtml = '';
  if (withAqi.length) {
    aqiHtml = '<div class="fact-row"><span class="fact-label">Avg AQI when heard</span><span class="fact-val">' + avgAqi + '</span></div>'
      + '<div class="fact-row"><span class="fact-label">Clean air detections (AQI≤40)</span><span class="fact-val">' + goodPct + '%</span></div>'
      + '<div class="fact-row"><span class="fact-label">Poor air detections (AQI≥80)</span><span class="fact-val">' + poorPct + '%</span></div>'
      + '<div class="fact-row"><span class="fact-label">AQI range</span><span class="fact-val">' + minAqi + ' – ' + maxAqi + '</span></div>'
      + '<p style="font-size:0.74rem;color:var(--text-muted);margin-top:0.6rem;">EU AQI at the exact moment each call was detected.</p>';
  } else {
    aqiHtml = '<p style="font-size:0.8rem;color:var(--text-muted);">No AQI data yet for this species.</p>';
  }

  var tempHtml = '';
  if (withTemp.length) {
    tempHtml = '<div class="sidebar-card"><h3>Temperature when heard</h3>'
      + '<div class="fact-row"><span class="fact-label">Average temperature</span><span class="fact-val">' + avgTemp + '°C</span></div>'
      + '<div class="fact-row"><span class="fact-label">Coolest detection</span><span class="fact-val">' + minTemp + '°C</span></div>'
      + '<div class="fact-row"><span class="fact-label">Warmest detection</span><span class="fact-val">' + maxTemp + '°C</span></div>'
      + '<p style="font-size:0.74rem;color:var(--text-muted);margin-top:0.6rem;">Thermal range of ' + name + ' in Baner — useful for tracking climate-driven shifts.</p>'
      + '</div>';
  }

  var nodeHtml = '';
  if (southN > 0) {
    nodeHtml = '<div class="sidebar-card"><h3>Which sensor hears it?</h3>'
      + '<div class="node-bar">'
        + '<div class="node-bar-seg" style="width:' + (100-southPct) + '%;background:var(--ep-green);"></div>'
        + '<div class="node-bar-seg" style="width:' + southPct + '%;background:var(--ep-tan);"></div>'
      + '</div>'
      + '<div class="node-legend">'
        + '<span><span class="node-dot" style="background:var(--ep-green);"></span>East balcony: ' + mainN + ' (' + (100-southPct) + '%)</span>'
        + '<span><span class="node-dot" style="background:var(--ep-tan);"></span>South (Baner Hill): ' + southN + ' (' + southPct + '%)</span>'
      + '</div>'
      + '<p style="font-size:0.74rem;color:var(--text-muted);margin-top:0.6rem;">'
        + (southPct > 60 ? name + ' is heard more from the south sensor — suggesting it forages closer to Baner Hill.' :
           southPct < 20 ? name + ' is detected almost exclusively from the east balcony — likely urban-adapted.' :
           'Both sensors detect ' + name + ' — it ranges across the full Baner habitat.')
      + '</p></div>';
  }

  /* ── NEW: Voice card HTML ── */
  var dawnPct = Math.round(dawnN/total*100);
  var voiceText = buildVoiceText(name, sci, total, peakH, monC, dawnPct, nightN, southPct, total);
  var voiceCardHtml = '<div class="voice-card">'
    + '<div class="voice-card-label">🎙️ In its own words</div>'
    + '<div class="voice-card-text">' + voiceText + '</div>'
    + '</div>';

  var wowHtml = '<div class="wow-grid">'
    + '<div class="wow-card"><div class="wow-val">' + total.toLocaleString('en-IN') + '</div><div class="wow-label">Total detections</div></div>'
    + '<div class="wow-card"><div class="wow-val">' + daysSpan + '</div><div class="wow-label">Days in dataset</div></div>'
    + (dawnN > 0 ? '<div class="wow-card"><div class="wow-val">' + Math.round(dawnN/total*100) + '%</div><div class="wow-label">Dawn chorus %</div></div>' : '')
    + '<div class="wow-card"><div class="wow-val">' + (best*100).toFixed(0) + '%</div><div class="wow-label">Best confidence</div></div>'
    + (maxGap > 0 ? '<div class="wow-card"><div class="wow-val">' + maxGap + 'd</div><div class="wow-label">Longest silent gap</div></div>' : '')
    + (nightN > 0 ? '<div class="wow-card"><div class="wow-val">' + nightN + '</div><div class="wow-label">Night detections</div></div>' : '')
    + '</div>';

  var tlRows = detections.slice(0,100).map(function(x) {
    var dt  = fmtIST(x.detected_at,{day:'numeric',month:'short',year:'numeric',hour:'2-digit',minute:'2-digit',hour12:true});
    var col = x.confidence >= 0.8 ? 'var(--ep-green)' : 'var(--ep-tan)';
    var showStar = hasAnyNewFlag && (x.detected_at === earliestTs);
    var nodeTag = x.node_id === 'baner_south_01' ? '<span class="tl-node">🌿 South</span>' : '';
    return '<div class="tl-row">'
      + '<span class="tl-time">' + dt + '</span>'
      + '<span class="tl-conf" style="color:' + col + '">' + (x.confidence*100).toFixed(0) + '%</span>'

/* ════════════════════════════════════════════════════════════════════════════
   RELATED SPECIES
════════════════════════════════════════════════════════════════════════════ */
async function loadRelated(sci, currentCls) {
  try {
    var rows = await fetchAll('/rest/v1/bird_detections?select=species_common,species_scientific&species_scientific=neq.' + encodeURIComponent(sci) + '&order=detected_at.desc', 1000);
    if (!Array.isArray(rows)) return;
    var map = {};
    rows.forEach(function(r){if(!map[r.species_scientific])map[r.species_scientific]=r;});
    var allRel = Object.values(map);
    var sameCls = currentCls ? allRel.filter(function(r){return getEcoTags(r.species_common,r.species_scientific)[0].cls===currentCls;}) : [];
    var rel = (sameCls.length >= 4 ? sameCls : allRel).slice(0,8);
    var grid = ge('related-grid');
    if (!grid) return;
    grid.innerHTML = rel.map(function(s,i){
      return '<a class="related-card" href="species.html?bird=' + s.species_scientific.replace(/ /g,'_') + '" aria-label="' + s.species_common + ' species profile">'
        + '<div class="related-thumb" id="rt-' + i + '">🦜</div>'
        + '<div class="related-card-name">' + s.species_common + '</div>'
        + '<div class="related-card-sci">' + s.species_scientific + '</div>'
        + '</a>';
    }).join('');
    rel.forEach(function(s,i){
      fetchWiki(s.species_scientific).then(function(w){
        var el = ge('rt-' + i);
        if (el && w && w.thumb) el.innerHTML = '<img src="' + w.thumb + '" alt="' + s.species_common + '" style="width:56px;height:56px;border-radius:50%;object-fit:cover;" loading="lazy">';
      });
    });
  } catch(e) {}
}

/* ════════════════════════════════════════════════════════════════════════════
   NEW: CO-OCCURRING BIRDS
   Find birds detected within ±10 minutes of this species' detections.
   Algorithm:
     1. For each detection of THIS species, build a 20-minute window.
     2. Fetch detections in those windows (capped to ~50 most recent windows for perf).
     3. Count unique species, exclude self, rank by co-occurrence count.
     4. Show top 6.
════════════════════════════════════════════════════════════════════════════ */
async function loadCoOccurring(sci, name, ownDetections) {
  var grid = ge('cooccur-grid');
  if (!grid) return;

  try {
    // Use up to 50 most recent detections to build windows — keeps query bounded
    var sample = ownDetections.slice(0, Math.min(50, ownDetections.length));
    if (sample.length < 2) {
      grid.innerHTML = '<div class="cooccur-empty">Not enough detections yet to find soundscape neighbours.</div>';
      return;
    }

    // Build a combined OR filter of time ranges
    // PostgREST: detected_at=gte.X&detected_at=lte.Y won't work for OR — use rpc-style or fetch by broad range
    // Simpler: fetch by min/max detection range, then filter client-side
    var times = sample.map(function(d){ return new Date(d.detected_at).getTime(); });
    var minT = Math.min.apply(null, times) - 10*60*1000;
    var maxT = Math.max.apply(null, times) + 10*60*1000;

    // Cap to last 90 days regardless, to keep query small
    var ninetyDaysAgo = Date.now() - 90*86400000;
    if (minT < ninetyDaysAgo) minT = ninetyDaysAgo;

    var minIso = new Date(minT).toISOString();
    var maxIso = new Date(maxT).toISOString();

    var url = '/rest/v1/bird_detections?select=species_common,species_scientific,detected_at'
      + '&detected_at=gte.' + encodeURIComponent(minIso)
      + '&detected_at=lte.' + encodeURIComponent(maxIso)
      + '&species_scientific=neq.' + encodeURIComponent(sci)
      + '&order=detected_at.desc';

    var nearby = await fetchAll(url, 1000);
    if (!Array.isArray(nearby) || !nearby.length) {
      grid.innerHTML = '<div class="cooccur-empty">No co-occurring species detected yet.</div>';
      return;
    }

    // Build sorted timestamp array of own detections (within last 90 days)
    var ownTimes = sample
      .map(function(d){ return new Date(d.detected_at).getTime(); })
      .filter(function(t){ return t >= ninetyDaysAgo; })
      .sort(function(a,b){ return a - b; });

    if (!ownTimes.length) {
      grid.innerHTML = '<div class="cooccur-empty">No recent detections to compare.</div>';
      return;
    }

    // For each nearby detection, check if any own time is within ±10min
    // Use binary search for performance
    var WINDOW = 10*60*1000;
    function inWindow(t) {
      // Binary search for closest own time
      var lo = 0, hi = ownTimes.length - 1;
      while (lo <= hi) {
        var mid = (lo + hi) >> 1;
        var diff = t - ownTimes[mid];
        if (Math.abs(diff) <= WINDOW) return true;
        if (diff > 0) lo = mid + 1; else hi = mid - 1;
      }
      // Also check neighbours after loop exits
      if (lo < ownTimes.length && Math.abs(t - ownTimes[lo]) <= WINDOW) return true;
      if (hi >= 0 && Math.abs(t - ownTimes[hi]) <= WINDOW) return true;
      return false;
    }

    var coCount = {};
    nearby.forEach(function(d){
      var t = new Date(d.detected_at).getTime();
      if (!inWindow(t)) return;
      var key = d.species_scientific;
      if (!coCount[key]) coCount[key] = {sci:key, common:d.species_common, count:0};
      coCount[key].count++;
    });

    var ranked = Object.keys(coCount)
      .map(function(k){return coCount[k];})
      .sort(function(a,b){return b.count - a.count;})
      .slice(0, 6);

    if (!ranked.length) {
      grid.innerHTML = '<div class="cooccur-empty">'+name+' tends to call alone — no consistent soundscape neighbours found within the same 20-minute windows.</div>';
      return;
    }

    grid.innerHTML = ranked.map(function(s, i){
      return '<a class="cooccur-card" href="species.html?bird=' + s.sci.replace(/ /g,'_') + '" aria-label="' + s.common + ' — heard ' + s.count + ' times near ' + name + '">'
        + '<div class="cooccur-thumb" id="cot-' + i + '">🦜</div>'
        + '<div class="cooccur-info">'
        + '<div class="cooccur-name">' + s.common + '</div>'
        + '<div class="cooccur-count">' + s.count + ' co-detection' + (s.count!==1?'s':'') + '</div>'
        + '</div>'
        + '</a>';
    }).join('');

    // Lazy-load thumbnails
    ranked.forEach(function(s, i){
      fetchWiki(s.sci).then(function(w){
        var el = ge('cot-' + i);
        if (el && w && w.thumb) {
          el.innerHTML = '<img src="' + w.thumb + '" alt="' + s.common + '" loading="lazy">';
        }
      });
    });
  } catch(e) {
    grid.innerHTML = '<div class="cooccur-empty">Could not load co-occurring species.</div>';
  }
}
